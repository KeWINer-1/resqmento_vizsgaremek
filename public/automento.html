<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ResQ" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>resq - Autómentő mód</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="src/favicon.ico" />
    <link rel="stylesheet" href="css/styles.css?v=20260404-2" />
  </head>
  <body class="app-theme automento-page">
    <header>
      <a class="brand" href="/map">
        <img src="src/logo.png" alt="resq logo" />
      </a>
      <button class="nav-toggle" type="button" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links">
        <a href="/map">Térkép</a>
        <a href="/automento" data-provider-link>Autómentő mód</a>
        <a href="/support" data-support-link>Ügyfélszolgálat</a>
        <a href="/rolunk">Rólunk</a>
        <a href="/auth" data-auth-link>Belépés</a>
      </nav>
    </header>

    <main class="section automento-section">
      <div class="form-card automento-card">
        <h2>Autómentő mód</h2>
        <p class="notice" id="automento-message"></p>

        <div class="card automento-block">
          <h3>Mentősi statisztika</h3>
          <div class="request-metrics">
            <div class="metric">
              <div class="metric-label">Értékelés</div>
              <div class="metric-value" id="provider-avg-rating">-</div>
              <div class="avg-stars-row">
                <div class="avg-stars" aria-hidden="true">
                  <span class="avg-stars-base">★★★★★</span>
                  <span class="avg-stars-fill" id="provider-avg-stars-fill">★★★★★</span>
                </div>
              </div>
            </div>
            <div class="metric">
              <div class="metric-label">Fuvarok</div>
              <div class="metric-value" id="provider-trip-count">0</div>
            </div>
            <div class="metric">
              <div class="metric-label">Összkereset</div>
              <div class="metric-value" id="provider-total-earnings">0 Ft</div>
            </div>
          </div>
          <button class="btn secondary" id="provider-ratings-toggle" type="button">
            Értékelések részletei
          </button>
          <div id="provider-ratings-panel" class="provider-ratings-panel" style="display: none;">
            <div id="provider-ratings-list" class="notice">Még nincs értékelés.</div>
          </div>
        </div>

        <div class="card automento-block">
          <h3>Beállítások</h3>
          <label>Szolgáltatási körzet (km)</label>
          <input id="provider-service-radius" type="number" min="1" />
          <label>Alapdíj</label>
          <input id="provider-base-fee" type="number" min="0" step="0.01" />
          <label>Km-díj</label>
          <input id="provider-per-km-fee" type="number" min="0" step="0.01" />
          <label>Képességek (vesszővel elválasztva)</label>
          <input id="provider-capabilities" type="text" placeholder="csörlő,tréler,autópálya" />
          <div class="cta-row automento-actions">
            <button class="btn secondary" id="provider-settings-save" type="button">Mentés</button>
          </div>
        </div>

        <div class="card automento-block" id="provider-history-card">
          <h3>Fuvar előzmények</h3>
          <p class="notice" id="provider-history-summary">Betöltés...</p>
          <div class="account-history-list" id="provider-history-list"></div>
        </div>
      </div>
    </main>

    <div id="status-toast" class="toast"></div>
    <script src="js/common.js?v=20260404-2"></script>
    <script src="js/automento.js?v=20260404-2"></script>
  </body>
</html>
