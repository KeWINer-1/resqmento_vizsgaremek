<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ResQ" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>resq - Belépés</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="src/favicon.ico" />
    <link rel="stylesheet" href="css/styles.css?v=20260404-2" />
  </head>
  <body class="app-theme">
    <header>
      <a class="brand" href="/map">
        <img src="src/logo.png" alt="resq logo" />
      </a>
      <button class="nav-toggle" type="button" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links">
        <a href="/rolunk">Rólunk</a>
        <a href="/map">Térkép</a>
        <a href="/auth" data-auth-link>Belépés</a>
      </nav>
    </header>

    <div class="form-card auth-card">
      <section id="login-panel">
        <h2>Belépés</h2>
        <div id="login-alert" class="alert-box" style="display: none;"></div>
        <form id="login-form" novalidate>
          <label>Email</label>
          <input type="email" name="email" required />
          <label>Jelszó</label>
          <div class="password-field">
            <input type="password" name="password" required />
            <button
              type="button"
              class="password-toggle"
              data-toggle-password
              aria-label="Jelszó megjelenítése"
              title="Jelszó megjelenítése"
            >👁</button>
          </div>
          <button class="btn" type="submit">Belépés</button>
        </form>
        <p class="notice auth-links-line">
          Nincs még fiókod?
          <a href="#" id="show-register">Itt tudsz regisztrálni.</a>
        </p>
        <p class="notice auth-links-line">
          <a href="#" id="show-forgot">Elfelejtett jelszó?</a>
        </p>
        <p class="notice" id="login-message"></p>
      </section>

      <section id="register-panel" style="display: none;">
        <h2>Regisztráció</h2>
        <div id="register-alert" class="alert-box" style="display: none;"></div>
        <form id="register-form" novalidate>
        <label>Email</label>
        <input type="email" name="email" required />
        <label>Jelszó</label>
        <div class="password-field">
          <input type="password" name="password" required />
          <button
            type="button"
            class="password-toggle"
            data-toggle-password
            aria-label="Jelszó megjelenítése"
            title="Jelszó megjelenítése"
          >👁</button>
        </div>
        <label>Szerepkör</label>
        <select name="role" id="role-select" required>
          <option value="User">Felhasználó</option>
          <option value="Provider">Autómentő</option>
        </select>

        <div id="provider-fields" style="display: none;">
          <label>Név / Cégnév</label>
          <input type="text" name="name" />
          <label>Telefonszám</label>
          <input type="text" name="phone" />
          <div class="split">
            <div>
              <label>Szolgáltatási körzet (km)</label>
              <input type="number" name="serviceRadiusKm" min="1" />
            </div>
            <div>
              <label>Alapdíj</label>
              <input type="number" name="baseFee" min="0" />
            </div>
          </div>
          <label>Km-díj</label>
          <input type="number" name="perKmFee" min="0" />
          <label>Képességek (vesszővel elválasztva)</label>
          <input type="text" name="capabilities" placeholder="csorlo, treler, autopalya" />
        </div>

          <button class="btn" type="submit">Regisztráció</button>
        </form>
        <p class="notice auth-links-line">
          Már van fiókod?
          <a href="#" id="show-login-from-register">Itt tudsz belépni.</a>
        </p>
        <p class="notice" id="register-message"></p>
      </section>

      <section id="forgot-panel" style="display: none;">
        <h2>Elfelejtett jelszó</h2>
        <div id="forgot-alert" class="alert-box" style="display: none;"></div>
        <form id="forgot-form" novalidate>
          <label>Email</label>
          <input type="email" name="email" required />
          <button class="btn" type="submit">Jelszó visszaállítás indítása</button>
        </form>
        <p class="notice auth-links-line">
          <a href="#" id="show-login-from-forgot">Vissza a belépéshez</a>
        </p>
        <p class="notice" id="forgot-message"></p>

        <div id="reset-alert" class="alert-box" style="display: none;"></div>
        <form id="reset-form" style="display: none;" novalidate>
          <label>Visszaállító token</label>
          <input type="text" name="token" required />
          <label>Új jelszó</label>
          <div class="password-field">
            <input type="password" name="newPassword" required minlength="6" />
            <button
              type="button"
              class="password-toggle"
              data-toggle-password
              aria-label="Jelszó megjelenítése"
              title="Jelszó megjelenítése"
            >👁</button>
          </div>
          <button class="btn" type="submit">Új jelszó mentése</button>
        </form>
        <p class="notice" id="reset-message"></p>
      </section>
    </div>

    <script src="js/common.js?v=20260404-2"></script>
    <script src="js/auth.js?v=20260404-2"></script>
  </body>
</html>
