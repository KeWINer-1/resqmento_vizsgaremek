<!doctype html>
<html lang="hu">
  <head>

    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>resq - Üzenet az adminnak</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;600&display=swap"

  <body class="app-theme">
    <header>
      <a class="brand" href="/map">
        <img src="src/logo.png" alt="resq logo" />

      <button class="nav-toggle" type="button" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav-links">
        <a href="/rolunk">Rólunk</a>
        <a href="/map">Térkép</a>
        <a href="/provider" data-provider-link>Autómentő mód</a>

    <section class="section">
      <div class="form-card">
        <h2>Privát üzenet az adminnak</h2>

          <div class="split" style="grid-template-columns: 1fr auto; margin-top: 12px;">
            <div>
              <input id="support-input" type="text" placeholder="Írj ide…" />
            </div>
            <div>
              <button class="btn" id="support-send" type="button">Küldés</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/common.js?v=20260404-2"></script>
    <script src="js/support.js?v=20260404-2"></script>
